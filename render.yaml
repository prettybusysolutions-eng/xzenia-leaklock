services:
  - type: web
    name: leaklock
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
        # LEAKLOCK_DOMAIN: set manually after deploy to your Render URL (e.g. https://leaklock.onrender.com)
      - key: LEAKLOCK_DOMAIN
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      # SMTP — uncomment and fill in with your email provider (Resend, SendGrid, etc.)
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   sync: false
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: SMTP_FROM
      #   sync: false

databases:
  - name: leaklock-db
    plan: free
    databaseName: leaklock
    ipAllowList: []
